<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f3ff;
}

header{
    background:#f3e8ff;
    padding:25px;
    text-align:center;
    font-size:35px;
    font-weight:bold;
    color:#7c3aed;
}

form{
    width:400px;
    margin:60px auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

label{
    display:block;
    margin-bottom:8px;
    color:#4c1d95;
    font-weight:bold;
    font-size:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#7c3aed;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#5b21b6;
}

a{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#7c3aed;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<header>Login</header>

<form action="login.php" method="POST">

<label>Email</label>

<input 
type="text"
name="username"
placeholder="tebarek.sirgat@ogr.sakarya.edu.tr"
>

<label>Şifre</label>

<input 
type="password"
name="password"
placeholder="b ile başlayan öğrenci numarası"
>

<button type="submit">
Giriş Yap
</button>

</form>

<a href="index.html">
Ana Sayfaya Dön
</a>

</body>
</html>
