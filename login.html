<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>Login</header>

<form action="login.php" method="POST" onsubmit="return loginKontrol()">

<label>Email</label>
<input 
type="text"
id="username"
name="username"
placeholder="tebarek.sirgat@ogr.sakarya.edu.tr"
>

<label>Şifre</label>
<input 
type="password"
id="password"
name="password"
placeholder="b ile başlayan öğrenci numarası"
>

<button type="submit">
Giriş Yap
</button>

</form>

<a href="index.html">
Ana Sayfaya Dön
</a>

<script>
function loginKontrol(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username == "" || password == ""){
        alert("Lütfen tüm alanları doldurun!");
        return false;
    }

    if(username != "tebarek.sirgat@ogr.sakarya.edu.tr"){
        alert("Email hatalı!");
        return false;
    }

    if(password == ""){
        alert("Şifre boş bırakılamaz!");
        return false;
    }

    return true;
}
</script>

</body>
</html>
