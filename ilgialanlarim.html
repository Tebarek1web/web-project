<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlgi Alanlarım</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>İlgi Alanlarım 🎬</header>

<div class="container" id="movies"></div>

<a href="index.html" class="back">ana sayfaya dön</a>

<script>

fetch("https://api.tvmaze.com/shows")
.then(res => res.json())
.then(data => {

    let container = document.getElementById("movies");

    data.slice(0, 8).forEach(show => {

        let image = show.image 
            ? show.image.medium 
            : "https://via.placeholder.com/200";

        let summary = show.summary 
            ? show.summary.replace(/<[^>]*>/g, "").substring(0, 80) + "..."
            : "Açıklama bulunamadı.";

        let year = show.premiered 
            ? show.premiered.substring(0, 4)
            : "Bilinmiyor";

        container.innerHTML += `
        <div class="card">
            <img src="${image}" alt="${show.name}">
            <h5>${show.name}</h5>
            <p><b>Yıl:</b> ${year}</p>
            <p>${summary}</p>
            <a href="${show.url}" target="_blank" class="btn btn-primary">
                Detayları İncele
            </a>
        </div>
        `;
    });

})
.catch(() => {
    document.getElementById("movies").innerHTML = "Filmler yüklenemedi";
});

</script>

</body>
</html>
