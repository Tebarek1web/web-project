<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<title>İletişim</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #ffffff;
}

header {
    background-color: #f3e8ff;
    text-align: center;
    padding: 20px;
    color: #7c3aed;
    font-size: 30px;
    font-weight: bold;
}

form {
    width: 400px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

label {
    font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #7c3aed;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#error {
    color: red;
    text-align: center;
}

a {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #7c3aed;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<header>İletişim</header>

<form action="iletisim.php" method="POST" onsubmit="return formKontrol()">

<input type="text" id="ad" name="ad">
<input type="text" id="email" name="email">
<textarea id="mesaj" name="mesaj"></textarea>
<p id="error"></p>

<button type="submit">Gönder</button>

</form>

<a href="index.html">ana sayfaya dön</a>

<script>
function formKontrol() {
    let ad = document.getElementById("ad").value;
    let email = document.getElementById("email").value;
    let mesaj = document.getElementById("mesaj").value;
    let error = document.getElementById("error");

    if (ad === "" || email === "" || mesaj === "") {
        error.innerText = "Lütfen tüm alanları doldurun.";
        return false;
    }

    if (!email.includes("@")) {
        error.innerText = "Geçerli bir email giriniz.";
        return false;
    }

    return true;
}
</script>

</body>

</html>
