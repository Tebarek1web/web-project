<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İletişim</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f3ff;
}

header {
    background-color: #ede9fe;
    text-align: center;
    padding: 25px;
    color: #7c3aed;
    font-size: 38px;
    font-weight: bold;
}

form {
    width: 420px;
    margin: 50px auto;
    background-color: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

label {
    display: block;
    color: #4c1d95;
    font-size: 20px;
    font-weight: bold;
    margin-top: 12px;
    margin-bottom: 8px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 17px;
    color: #222;
    box-sizing: border-box;
}

textarea {
    height: 100px;
    resize: vertical;
}

button {
    width: 100%;
    padding: 13px;
    margin-top: 25px;
    background-color: #7c3aed;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background-color: #5b21b6;
}

.back {
    display: block;
    text-align: center;
    margin-top: 25px;
    color: #7c3aed;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<header>İletişim</header>

<form action="iletisim.php" method="POST">

    <label>Ad Soyad</label>
    <input type="text" name="ad" placeholder="Ad Soyad">

    <label>Email</label>
    <input type="email" name="email" placeholder="Email">

    <label>Mesaj</label>
    <textarea name="mesaj" placeholder="Mesajınızı yazınız"></textarea>

    <button type="submit">Gönder</button>

</form>

<a class="back" href="index.html">ana sayfaya dön</a>

</body>
</html>
