<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İletişim</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="iletişim.css">
</head>

<body>

<header>İletişim</header>

<form id="vueApp" action="iletisim.php" method="POST" onsubmit="return kontrolEt()">

    <label>Ad Soyad</label>
    <input type="text" id="ad" name="ad" placeholder="Ad Soyad">

    <label>Cinsiyet</label>
    <div class="cinsiyet-secim">
        <input type="radio" id="erkek" name="cinsiyet" value="Erkek">
        <label for="erkek">Erkek</label>

        <input type="radio" id="kadin" name="cinsiyet" value="Kadın">
        <label for="kadin">Kadın</label>
    </div>

    <label>Email</label>
    <input type="email" id="email" name="email" placeholder="Email">

    <label>Telefon</label>
    <input type="text" id="telefon" name="telefon" placeholder="Telefon">

    <label>Konu</label>
    <select id="konu" name="konu">
        <option value="">Konu seçiniz</option>
        <option value="Soru">Soru</option>
        <option value="Öneri">Öneri</option>
        <option value="Şikayet">Şikayet</option>
    </select>

    <div class="onay-kutusu">
        <input type="checkbox" id="onay" name="onay" value="Kabul edildi">
        <label for="onay">Bilgilerimin gönderilmesini kabul ediyorum.</label>
    </div>

    <label>Mesaj</label>
    <textarea id="mesaj" name="mesaj" placeholder="Mesajınızı yazınız"></textarea>

    <button type="button" @click="vueKontrolEt">Vue.js ile Kontrol Et</button>

    <button type="submit">Gönder</button>
<button type="reset" class="btn btn-danger">
Temizle
</button>
</form>

<a class="back" href="index.html">ana sayfaya dön</a>

<script>
function kontrolEt(){

    let ad = document.getElementById("ad").value;
    let email = document.getElementById("email").value;
    let telefon = document.getElementById("telefon").value;
    let konu = document.getElementById("konu").value;
    let mesaj = document.getElementById("mesaj").value;
    let cinsiyet = document.querySelector('input[name="cinsiyet"]:checked');
    let onay = document.getElementById("onay").checked;

    if(ad == "" || email == "" || telefon == "" || konu == "" || mesaj == ""){
        alert("Lütfen tüm alanları doldurun!");
        return false;
    }

    if(cinsiyet == null){
        alert("Lütfen cinsiyet seçiniz!");
        return false;
    }

    if(!email.includes("@")){
        alert("Geçerli bir email giriniz!");
        return false;
    }

    if(isNaN(telefon)){
        alert("Telefon alanına sadece rakam giriniz!");
        return false;
    }

    if(onay == false){
        alert("Lütfen onay kutusunu işaretleyiniz!");
        return false;
    }

    return true;
}
</script>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
Vue.createApp({
    methods:{
        vueKontrolEt(){

            let ad = document.getElementById("ad").value;
            let email = document.getElementById("email").value;
            let telefon = document.getElementById("telefon").value;
            let konu = document.getElementById("konu").value;
            let mesaj = document.getElementById("mesaj").value;
            let cinsiyet = document.querySelector('input[name="cinsiyet"]:checked');
            let onay = document.getElementById("onay").checked;

            if(ad == "" || email == "" || telefon == "" || konu == "" || mesaj == ""){
                alert("Vue.js kontrolü: Lütfen tüm alanları doldurun!");
                return;
            }

            if(cinsiyet == null){
                alert("Vue.js kontrolü: Lütfen cinsiyet seçiniz!");
                return;
            }

            if(!email.includes("@")){
                alert("Vue.js kontrolü: Geçerli bir email giriniz!");
                return;
            }

            if(isNaN(telefon)){
                alert("Vue.js kontrolü: Telefon sadece rakam olmalıdır!");
                return;
            }

            if(onay == false){
                alert("Vue.js kontrolü: Onay kutusunu işaretleyiniz!");
                return;
            }

            alert("Vue.js kontrolü başarılı!");
        }
    }
}).mount("#vueApp");
</script>

</body>
</html>
