<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlgi Alanlarım</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background-color: #ffffff;
}

header {
    text-align: center;
    padding: 20px;
    color: #7c3aed;
    font-size: 30px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    width: 80%;
    margin: 20px auto;
}

.card {
    display: block;
    background: #faf5ff;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
    text-decoration: none;
    color: black;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 10px;
}

.card p {
    margin-top: 10px;
    font-weight: bold;
}

a.back {
    display: block;
    text-align: center;
    margin: 25px;
    color: #7c3aed;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>

<body>

<header>İlgi Alanlarım 🎬</header>

<div class="container" id="movies"></div>

<a href="index.html" class="back">ana sayfaya dön</a>

<script>

fetch("https://api.tvmaze.com/shows")
.then(res => res.json())
.then(data => {

    let container = document.getElementById("movies");

    data.slice(0, 8).forEach(show => {

        let image = show.image 
            ? show.image.medium 
            : "https://via.placeholder.com/200";

        container.innerHTML += `
        <a class="card" href="${show.url}" target="_blank">
            <img src="${image}">
            <p>${show.name}</p>
        </a>
        `;
    });

})
.catch(() => {
    document.getElementById("movies").innerHTML = "Filmler yüklenemedi ";
});

</script>

</body>

</html>
